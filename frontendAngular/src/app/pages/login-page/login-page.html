<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
      <app-theme-toggle></app-theme-toggle>

    <!-- Login Form -->
    @if (!isSignup()) {
      <div>
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
          Login
        </h1>

        <div class="space-y-5">

          <input
            type="text"
            placeholder="Enter Username or Email"
            (change)="setEmail($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <input
            type="password"
            placeholder="Enter Password"
            (change)="setPassword($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <button
            (click)="userLogin()"
            class="w-full bg-black text-white py-3 rounded-xl font-semibold hover:bg-gray-800 transition-all duration-300"
          >
            Login
          </button>

          <button
            (click)="loginWithGoogle()"
            class="w-full bg-white border-2 border-gray-300 text-gray-700 py-3 rounded-xl font-semibold flex items-center justify-center gap-3 hover:bg-gray-50 hover:border-gray-400 transition-all duration-300 shadow-sm"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#1f2937"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34a853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fbbc05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#ea4335"/>
            </svg>
            Continue with Google
          </button>

        </div>

        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Don't have an account?
            <button
              (click)="toggleForm()"
              class="text-black font-semibold hover:underline"
            >
              Sign Up
            </button>
          </p>
        </div>
      </div>
    }

    <!-- Signup Form -->
    @if (isSignup()) {
      <div>
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
          Sign Up
        </h1>

        <div class="space-y-5">

          <input
            type="text"
            placeholder="Enter Full Name"
            (change)="setName($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <input
            type="text"
            placeholder="Enter Username"
            (change)="setSignupUsername($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <input
            type="email"
            placeholder="Enter Email"
            (change)="setSignupEmail($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <input
            type="password"
            placeholder="Enter Password"
            (change)="setSignupPassword($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <button
            (click)="userSignup()"
            class="w-full bg-black text-white py-3 rounded-xl font-semibold hover:bg-gray-800 transition-all duration-300"
          >
            Sign Up
          </button>

        </div>

        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Already have an account?
            <button
              (click)="toggleForm()"
              class="text-black font-semibold hover:underline"
            >
              Login
            </button>
          </p>
        </div>
      </div>
    }

  </div>

</div>
