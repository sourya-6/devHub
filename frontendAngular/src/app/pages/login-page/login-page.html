<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <!-- Login Form -->
    @if (!isSignup()) {
      <div>
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
          Login
        </h1>

        <div class="space-y-5">

          <input
            type="text"
            placeholder="Enter Username or Email"
            (change)="setEmail($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <input
            type="password"
            placeholder="Enter Password"
            (change)="setPassword($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <button
            (click)="userLogin()"
            class="w-full bg-black text-white py-3 rounded-xl font-semibold hover:bg-gray-800 transition-all duration-300"
          >
            Login
          </button>

          <button (click)="loginWithGoogle()">
  Continue with Google
</button>

        </div>

        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Don't have an account?
            <button
              (click)="toggleForm()"
              class="text-black font-semibold hover:underline"
            >
              Sign Up
            </button>
          </p>
        </div>
      </div>
    }

    <!-- Signup Form -->
    @if (isSignup()) {
      <div>
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
          Sign Up
        </h1>

        <div class="space-y-5">

          <input
            type="text"
            placeholder="Enter Full Name"
            (change)="setName($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <input
            type="text"
            placeholder="Enter Username"
            (change)="setSignupUsername($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <input
            type="email"
            placeholder="Enter Email"
            (change)="setSignupEmail($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <input
            type="password"
            placeholder="Enter Password"
            (change)="setSignupPassword($event)"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
          />

          <button
            (click)="userSignup()"
            class="w-full bg-black text-white py-3 rounded-xl font-semibold hover:bg-gray-800 transition-all duration-300"
          >
            Sign Up
          </button>

        </div>

        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Already have an account?
            <button
              (click)="toggleForm()"
              class="text-black font-semibold hover:underline"
            >
              Login
            </button>
          </p>
        </div>
      </div>
    }

  </div>

</div>
