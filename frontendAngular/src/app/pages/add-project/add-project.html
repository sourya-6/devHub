<div class="min-h-screen bg-gray-100 px-4 py-10">
  <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl p-8 md:p-10">
    <div class="flex items-center justify-between gap-4 flex-wrap mb-8">
      <div>
        <p class="text-sm uppercase tracking-[0.35em] text-gray-500 mb-2">Create Project</p>
        <h1 class="text-4xl font-bold text-gray-900">Add New Project</h1>
      </div>

      <a
        routerLink="/dashbord"
        class="px-5 py-3 rounded-xl border border-gray-300 text-gray-700 font-semibold hover:bg-gray-100 transition duration-300"
      >
        Back to Dashboard
      </a>
    </div>

    <div class="grid gap-6 md:grid-cols-2">
      <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Title</label>
        <input
          type="text"
          [(ngModel)]="title"
          placeholder="Project title"
          class="w-full border border-gray-300 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
        />
      </div>

      <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
        <textarea
          [(ngModel)]="description"
          rows="5"
          placeholder="Describe your project"
          class="w-full border border-gray-300 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300 resize-none"
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Live Link</label>
        <input
          type="url"
          [(ngModel)]="liveLink"
          placeholder="https://your-live-demo.com"
          class="w-full border border-gray-300 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">GitHub Link</label>
        <input
          type="url"
          [(ngModel)]="gitHubLink"
          placeholder="https://github.com/..."
          class="w-full border border-gray-300 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
        />
      </div>

      <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Tags</label>
        <input
          type="text"
          [(ngModel)]="tags"
          placeholder="Angular, Node, MongoDB"
          class="w-full border border-gray-300 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-black transition-all duration-300"
        />
        <p class="text-xs text-gray-500 mt-2">Separate tags with commas.</p>
      </div>

      <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Project Image</label>
        <input
          type="file"
          accept="image/*"
          (change)="onImageChange($event)"
          class="w-full border border-gray-300 rounded-2xl px-4 py-3 bg-white outline-none focus:ring-2 focus:ring-black transition-all duration-300"
        />
      </div>
    </div>

    <div class="flex items-center justify-end gap-3 mt-8">
      <a
        routerLink="/dashbord"
        class="px-5 py-3 rounded-xl border border-gray-300 text-gray-700 font-semibold hover:bg-gray-100 transition duration-300"
      >
        Cancel
      </a>
      <button
        (click)="createProject()"
        class="px-6 py-3 rounded-xl bg-black text-white font-semibold hover:bg-gray-800 transition duration-300"
      >
        Save Project
      </button>
    </div>
  </div>
</div>
