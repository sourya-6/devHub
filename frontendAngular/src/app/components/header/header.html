<header class="app-header sticky top-0 z-50 backdrop-blur">
	<div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
		<a routerLink="/dashbord" class="brand-link flex items-center gap-3">
			<div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-black text-lg font-bold text-white">D</div>
			<div>
				<p class="brand-eyebrow text-sm uppercase tracking-[0.35em]">DevHub</p>
				<h1 class="text-lg font-bold">Project Hub</h1>
			</div>
		</a>

		<nav class="header-nav flex items-center gap-2 sm:gap-3">
			<app-theme-toggle></app-theme-toggle>

			<div *ngIf="isLoggedIn()" class="relative">
				<button
					type="button"
					(click)="toggleNotifications()"
					class="notification-button"
					aria-label="Open notifications"
				>
					<span>🔔</span>
					<span class="notification-badge">{{ unreadCount() }}</span>
				</button>

				@if (showNotifications()) {
					<div class="notification-panel">
						<div class="notification-panel__header">
							<div>
								<p class="notification-panel__eyebrow">Activity</p>
								<h2>Notifications</h2>
							</div>
							<button type="button" class="notification-panel__mark-all" (click)="markAllRead()">
								Mark all read
							</button>
						</div>

						@if (notifications().length === 0) {
							<p class="notification-panel__empty">No notifications yet.</p>
						} @else {
							<div class="notification-list">
								@for (notification of notifications(); track notification._id) {
									<button
										type="button"
										(click)="openNotification(notification)"
										class="notification-item"
										[ngClass]="{ 'notification-item--unread': !notification.read }"
									>
										<img [src]="notification.actor.avatar" [alt]="notification.actor.name" class="notification-item__avatar" />
										<div class="notification-item__body">
											<p class="notification-item__message">{{ notification.message }}</p>
											<p class="notification-item__meta">{{ notification.project.title }}</p>
										</div>
										<span class="notification-item__time">{{ notification.createdAt | date:'shortTime' }}</span>
									</button>
								}
							</div>
						}
					</div>
				}
			</div>

			<a *ngIf="isLoggedIn()" routerLink="/dashbord" class="nav-link rounded-xl px-4 py-2 text-sm font-semibold transition">Dashboard</a>
			<a *ngIf="isLoggedIn()" routerLink="/add-project" class="nav-link rounded-xl px-4 py-2 text-sm font-semibold transition">Add Project</a>
			<a *ngIf="!isLoggedIn()" routerLink="/" class="rounded-xl bg-black px-4 py-2 text-sm font-semibold text-white hover:bg-gray-800 transition">Login</a>
			<button
				*ngIf="isLoggedIn()"
				(click)="logout()"
				class="rounded-xl bg-black px-4 py-2 text-sm font-semibold text-white hover:bg-gray-800 transition"
			>
				Logout
			</button>
		</nav>
	</div>
</header>
