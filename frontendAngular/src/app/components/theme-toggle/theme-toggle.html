<button class="theme-switch" (click)="toggle()" [attr.aria-pressed]="isDark" aria-label="Toggle theme">
  <div class="track" [class.track--dark]="isDark">
    <div class="icons">
      <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
      <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/></svg>
    </div>
    <div class="thumb" [class.thumb--right]="isDark"></div>
  </div>
</button>
