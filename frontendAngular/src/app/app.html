@if (showChrome()) {
	<app-header></app-header>
}

@if (isNavigating()) {
	<div class="route-loader" aria-live="polite" aria-busy="true">
		<div class="route-loader__card">
			<svg class="route-loader__svg" viewBox="0 0 50 50" role="img" aria-label="Loading">
				<circle class="route-loader__track" cx="25" cy="25" r="20"></circle>
				<circle class="route-loader__spinner" cx="25" cy="25" r="20"></circle>
			</svg>
			<p>Loading...</p>
		</div>
	</div>
}

<router-outlet></router-outlet>

<app-toast-container></app-toast-container>

@if (showChrome()) {
	<app-footer></app-footer>
}
